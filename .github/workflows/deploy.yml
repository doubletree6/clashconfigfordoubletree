name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'dist/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify files
        run: |
          echo "=== substore.js ==="
          head -30 dist/substore.js
          echo ""
          echo "=== File sizes ==="
          ls -la dist/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
          enable_jekyll: false