# Clash 配置文件
# 基于 powerfullz/override-rules，由 build.js 自动生成
# 使用方式：将 YOUR_SUBSCRIPTION_URL 替换为你的订阅地址

port: 7890
socks-port: 7891
mixed-port: 7893
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: false
external-controller: 127.0.0.1:9090

dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - localhost.ptlogin2.qq.com
    - "+.srv.nintendo.net"
    - "+.stun.playstation.net"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "+.xboxlive.com"
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
  fallback:
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN

proxy-providers:
  Subscribe:
    type: http
    interval: 86400
    url: YOUR_SUBSCRIPTION_URL
    path: ./proxy_providers/tmp.yaml
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 1800

proxies: null

proxy-groups:
  - name: 选择代理
    type: select
    use:
      - Subscribe
  - name: 手动选择
    type: select
    use:
      - Subscribe
  - name: ♻️ 自动选择
    type: url-test
    lazy: true
    url: http://www.gstatic.com/generate_204
    interval: 900
    use:
      - Subscribe
  - name: 故障转移
    type: fallback
    url: http://www.gstatic.com/generate_204
    interval: 180
    use:
      - Subscribe
  - name: 静态资源
    type: select
    use:
      - Subscribe
  - name: AI
    type: select
    use:
      - Subscribe
  - name: Crypto
    type: select
    use:
      - Subscribe
  - name: Google
    type: select
    use:
      - Subscribe
  - name: Microsoft
    type: select
    use:
      - Subscribe
  - name: YouTube
    type: select
    use:
      - Subscribe
  - name: Bilibili
    type: select
    use:
      - Subscribe
  - name: Netflix
    type: select
    use:
      - Subscribe
  - name: TikTok
    type: select
    use:
      - Subscribe
  - name: Spotify
    type: select
    use:
      - Subscribe
  - name: E-Hentai
    type: select
    use:
      - Subscribe
  - name: Telegram
    type: select
    use:
      - Subscribe
  - name: OneDrive
    type: select
    use:
      - Subscribe
  - name: PikPak
    type: select
    use:
      - Subscribe
  - name: SSH(22端口)
    type: select
    use:
      - Subscribe
  - name: 搜狗输入法
    type: select
    proxies:
      - DIRECT
      - REJECT
  - name: 直连
    type: select
    proxies:
      - DIRECT
      - 选择代理
  - name: 广告拦截
    type: select
    proxies:
      - REJECT
      - REJECT-DROP
      - DIRECT

rule-providers:
  Direct:
    type: http
    behavior: domain
    interval: 86400
    url: https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Direct/Direct.yaml
    path: ./ruleset/Direct.yaml
  Lan:
    type: http
    behavior: classical
    interval: 86400
    url: https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Lan/Lan.yaml
    path: ./ruleset/Lan.yaml
  Ad:
    type: http
    behavior: domain
    interval: 86400
    url: https://gcore.jsdelivr.net/gh/217heidai/adblockfilters@main/rules/adblockmihomolite.yaml
    path: ./ruleset/adblock_reject.yaml
  ProxyLite:
    type: http
    behavior: classical
    interval: 86400
    url: https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/ProxyLite/ProxyLite.yaml
    path: ./ruleset/ProxyLite.yaml
  ChinaIP:
    type: http
    behavior: ipcidr
    interval: 86400
    url: https://cdn.jsdelivr.net/gh/soffchen/GeoIP2-CN@release/clash-rule-provider.yml
    path: ./ruleset/ChinaIP.yaml

rules:
